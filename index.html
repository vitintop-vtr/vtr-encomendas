<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>VTR ENCOMENDAS</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background-image:url("ChatGPT Image 3 de mar. de 2026, 23_25_17.png");
background-size:cover;
background-position:center;
}

.login-box{
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:10px;
text-align:center;
color:white;
width:320px;
}

h1{
margin-bottom:10px;
}

p{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#1f5fff;
border:none;
color:white;
font-weight:bold;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0039cb;
}

</style>

</head>

<body>

<div class="login-box">

<h1>VTR ENCOMENDAS</h1>

<p>Sistema de Gestão de Entregas</p>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">ENTRAR</button>

</div>

<script>

function login(){

let usuario = document.getElementById("usuario").value;
let senha = document.getElementById("senha").value;

if(usuario === "vtr" && senha === "31081996"){

window.location.href = "sistema.html";

}else{

alert("Usuário ou senha incorretos");

}

}

</script>

</body>

</html>
