<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>VTR ENCOMENDAS</title>

<style>

body{
background:#0b1a3a;
font-family:Arial;
color:white;
margin:0;
padding:40px;
}

h1{
margin-bottom:30px;
}

.card{
background:#1a3268;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input, select{
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:8px 15px;
background:#2e6cff;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

button:hover{
background:#1746b3;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #2b4b91;
text-align:left;
}

.devedor{
background:#a11a1a;
}

.ok{
background:#1c7a2c;
}

</style>

</head>

<body>

<h1>VTR ENCOMENDAS</h1>

<div class="card">

<h2>Cadastrar Cliente</h2>

<input id="novoCliente" placeholder="Nome do cliente">
<button onclick="addCliente()">Cadastrar</button>

<select id="listaClientes"></select>

</div>

<div class="card">

<h2>Nova Entrega</h2>

<select id="clienteEntrega"></select>
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="valor" placeholder="Valor">
<button onclick="addEntrega()">Adicionar</button>

</div>

<div class="card">

<h2>Entregas</h2>

<table>

<thead>
<tr>
<th>Cliente</th>
<th>Origem</th>
<th>Destino</th>
<th>Valor</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabelaEntregas"></tbody>

</table>

</div>

<div class="card">

<h2>Registrar Gasto</h2>

<input id="tipoGasto" placeholder="Tipo">
<input id="valorGasto" placeholder="Valor">
<button onclick="addGasto()">Adicionar</button>

<ul id="listaGastos"></ul>

</div>

<script>

let clientes = []
let entregas = []
let gastos = []

function atualizarClientes(){

let select = document.getElementById("clienteEntrega")
select.innerHTML=""

clientes.forEach(c=>{
select.innerHTML += `<option>${c}</option>`
})

}

function addCliente(){

let nome = document.getElementById("novoCliente").value

if(nome=="") return

clientes.push(nome)

atualizarClientes()

document.getElementById("novoCliente").value=""

}

function addEntrega(){

let cliente = document.getElementById("clienteEntrega").value
let origem = document.getElementById("origem").value
let destino = document.getElementById("destino").value
let valor = document.getElementById("valor").value

entregas.push({cliente,origem,destino,valor})

renderEntregas()

}

function renderEntregas(){

let tabela = document.getElementById("tabelaEntregas")

tabela.innerHTML=""

entregas.forEach((e,i)=>{

tabela.innerHTML += `
<tr>
<td>${e.cliente}</td>
<td>${e.origem}</td>
<td>${e.destino}</td>
<td>${e.valor}</td>
<td><button onclick="delEntrega(${i})">Excluir</button></td>
</tr>
`

})

}

function delEntrega(i){

entregas.splice(i,1)

renderEntregas()

}

function addGasto(){

let tipo = document.getElementById("tipoGasto").value
let valor = document.getElementById("valorGasto").value

gastos.push({tipo,valor})

renderGastos()

}

function renderGastos(){

let lista = document.getElementById("listaGastos")

lista.innerHTML=""

gastos.forEach(g=>{

lista.innerHTML += `<li>${g.tipo} - R$ ${g.valor}</li>`

})

}

</script>

</body>

</html>
