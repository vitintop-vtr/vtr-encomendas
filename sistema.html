
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTR ENCOMENDAS | 7.4 FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Segoe UI,Arial;background:#0f172a;color:#fff;}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("ChatGPT Image 3 de mar. de 2026, 23_27_01.png") center center no-repeat;
background-size:500px;
opacity:0.08;
z-index:0;
}

.aplicativo{
position:relative;
z-index:1;
}
body::after{
content:"";
position:fixed;
inset:0;
background:rgba(15,23,42,0.95);
z-index:0;
}

.app{position:relative;z-index:1;max-width:1400px;margin:auto;padding:30px;}
.header{text-align:center;margin-bottom:30px;}
.header img{height:80px;}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:14px;
text-align:center;
}

.modules{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.module{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:14px;
}

.module input,.module select,.module textarea{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.1);
color:#fff;
}

.module textarea{height:60px;resize:none;}

.module button{
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:#2563eb;
color:#fff;
cursor:pointer;
}

.devedores-painel{
padding:15px;
border-radius:12px;
margin-bottom:20px;
transition:0.3s;
}

.painel-vermelho{
background:rgba(220,38,38,0.15);
border:1px solid rgba(220,38,38,0.4);
}

.painel-verde{
background:rgba(34,197,94,0.15);
border:1px solid rgba(34,197,94,0.4);
}

.table-section{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:14px;
overflow-x:auto;
}

table{width:100%;border-collapse:collapse;}
th,td{
padding:8px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:12px;
}

button.small{
padding:4px 6px;
font-size:10px;
background:#dc2626;
border:none;
border-radius:6px;
color:#fff;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<img src="SUA_LOGO_AQUI.png">
</div>

<div class="dashboard">
<div class="card"><h4>Faturamento</h4><span id="fat">R$ 0,00</span></div>
<div class="card"><h4>Gastos</h4><span id="gast">R$ 0,00</span></div>
<div class="card"><h4>Lucro</h4><span id="lucro">R$ 0,00</span></div>
<div class="card"><h4>Devedores</h4><span id="totalDev">0</span></div>
</div>

<div id="painelDev" class="devedores-painel painel-verde">
<h4 id="tituloDev">✅ Nenhum devedor</h4>
<div id="listaDev"></div>
</div>

<div class="modules">

<div class="module">
<h4>Nova Entrega</h4>
<form onsubmit="event.preventDefault(); salvarEntrega();">
<select id="clienteSelect"></select>
<input id="origem" placeholder="Origem" required>
<input id="destino" placeholder="Destino" required>
<input id="valor" type="number" placeholder="Valor" required>
<textarea id="obs" placeholder="Observações"></textarea>
<button type="submit">Salvar</button>
</form>
</div>

<div class="module">
<h4>Cadastro Clientes</h4>
<form onsubmit="event.preventDefault(); salvarCliente();">
<input id="novoCliente" placeholder="Nome Cliente" required>
<button type="submit">Salvar Cliente</button>
</form>
<button onclick="excluirCliente()">Excluir Selecionado</button>
</div>

<div class="module">
<h4>Gastos</h4>
<form onsubmit="event.preventDefault(); salvarGasto();">
<select id="tipoGasto">
<option>Combustível</option>
<option>Manutenção</option>
<option>Alimentação</option>
<option>Outros</option>
</select>
<input id="valorGasto" type="number" placeholder="Valor" required>
<button type="submit">Adicionar Gasto</button>
</form>
</div>

<div class="module">
<h4>Devedores</h4>
<form onsubmit="event.preventDefault(); salvarDevedor();">
<input id="nomeDev" placeholder="Nome" required>
<input id="valorDev" type="number" placeholder="Valor" required>
<button type="submit">Adicionar</button>
</form>
</div>

</div>

<div class="module" style="margin-bottom:20px;">
<h4>Relatório</h4>
<button onclick="gerarRelatorio()">Gerar Relatório Completo PDF</button>
</div>

<div class="table-section">
<h4>Movimentações</h4>
<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Destino</th>
<th>Valor</th>
<th>Obs</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("vtr74_clientes")) || [];
let registros = JSON.parse(localStorage.getItem("vtr74_registros")) || [];
let devedores = JSON.parse(localStorage.getItem("vtr74_devedores")) || [];

function salvarLocal(){
localStorage.setItem("vtr74_clientes",JSON.stringify(clientes));
localStorage.setItem("vtr74_registros",JSON.stringify(registros));
localStorage.setItem("vtr74_devedores",JSON.stringify(devedores));
}

function carregarClientes(){
clienteSelect.innerHTML="";
clientes.forEach(c=>clienteSelect.innerHTML+=`<option>${c}</option>`);
}

function salvarCliente(){
clientes.push(novoCliente.value);
novoCliente.value="";
salvarLocal();
carregarClientes();
}

function excluirCliente(){
clientes=clientes.filter(c=>c!==clienteSelect.value);
salvarLocal();
carregarClientes();
}

function salvarEntrega(){
registros.push({
data:new Date().toLocaleDateString("pt-BR"),
cliente:clienteSelect.value,
origem:origem.value,
destino:destino.value,
valor:parseFloat(valor.value),
obs:obs.value
});
origem.value=destino.value=valor.value=obs.value="";
salvarLocal();
atualizar();
}

function salvarGasto(){
registros.push({
data:new Date().toLocaleDateString("pt-BR"),
cliente:"Gasto - "+tipoGasto.value,
origem:"-",
destino:"-",
valor:-Math.abs(parseFloat(valorGasto.value)),
obs:"-"
});
valorGasto.value="";
salvarLocal();
atualizar();
}

function salvarDevedor(){
devedores.push({nome:nomeDev.value,valor:parseFloat(valorDev.value)});
nomeDev.value=valorDev.value="";
salvarLocal();
atualizar();
}

function excluirRegistro(i){
registros.splice(i,1);
salvarLocal();
atualizar();
}

function atualizar(){

let f=0,g=0;
tabela.innerHTML="";
listaDev.innerHTML="";

registros.forEach((r,i)=>{
if(r.valor>0)f+=r.valor;
if(r.valor<0)g+=Math.abs(r.valor);

tabela.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${r.cliente}</td>
<td>${r.origem}</td>
<td>${r.destino}</td>
<td>R$ ${r.valor.toFixed(2)}</td>
<td>${r.obs}</td>
<td><button class="small" onclick="excluirRegistro(${i})">Excluir</button></td>
</tr>`;
});

devedores.forEach(d=>{
listaDev.innerHTML+=d.nome+" - R$ "+d.valor.toFixed(2)+"<br>";
});

if(devedores.length===0){
painelDev.className="devedores-painel painel-verde";
tituloDev.innerText="✅ Nenhum devedor";
}else{
painelDev.className="devedores-painel painel-vermelho";
tituloDev.innerText="⚠ Devedores em Aberto";
}

fat.innerText="R$ "+f.toFixed(2);
gast.innerText="R$ "+g.toFixed(2);
lucro.innerText="R$ "+(f-g).toFixed(2);
totalDev.innerText=devedores.length;
}

function gerarRelatorio(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
let y=15,total=0;

doc.text("RELATÓRIO COMPLETO - VTR ENCOMENDAS",20,y);
y+=10;

registros.forEach(r=>{
doc.text(r.data+" | "+r.cliente+" | "+r.origem+" → "+r.destino+" | R$ "+r.valor.toFixed(2),20,y);
y+=6;
total+=r.valor;
if(y>260){doc.addPage();y=15;}
});

y+=10;
doc.text("DEVEDORES:",20,y);
y+=6;

devedores.forEach(d=>{
doc.text(d.nome+" - R$ "+d.valor.toFixed(2),20,y);
y+=6;
});

doc.text("Resultado Final: R$ "+total.toFixed(2),20,y+10);
doc.save("RELATORIO_COMPLETO_VTR_ENCOMENDAS.pdf");
}

carregarClientes();
atualizar();

</script>

</body>
</html>
