<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VTR ENCOMENDAS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:#0f172a;
color:#fff;
}

.app{
max-width:1400px;
margin:auto;
padding:30px;
}

.header{text-align:center;margin-bottom:30px;}
.header img{height:150px;}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:14px;
text-align:center;
}

.modules{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.module{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:14px;
}

.module input,.module select,.module textarea{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.1);
color:#fff;
}

.module textarea{height:60px;}

.module button{
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:#2563eb;
color:#fff;
cursor:pointer;
margin-bottom:5px;
}

button.small{
padding:4px 6px;
font-size:10px;
border:none;
border-radius:6px;
color:#fff;
margin-right:3px;
}

.excluir{background:#dc2626;}
.pago{background:#16a34a;}

.pago-linha{
background:rgba(34,197,94,0.2);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:12px;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
<img src="logo.png">
</div>

<div class="dashboard">

<div class="card">
<h4>Faturamento</h4>
<span id="fat">R$ 0</span>
</div>

<div class="card">
<h4>Gastos</h4>
<span id="gast">R$ 0</span>
</div>

<div class="card">
<h4>Lucro</h4>
<span id="lucro">R$ 0</span>
</div>

<div class="card">
<h4>Devedores</h4>
<span id="totalDev">0</span>
</div>

</div>

<div class="modules">

<div class="module">

<h4>Nova Entrega</h4>

<select id="clienteSelect"></select>

<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="valor" type="number" placeholder="Valor">

<textarea id="obs" placeholder="Observações"></textarea>

<button onclick="salvarEntrega()">Salvar</button>

</div>

<div class="module">

<h4>Clientes</h4>

<input id="novoCliente" placeholder="Nome cliente">

<button onclick="salvarCliente()">Salvar</button>

</div>

</div>

<button onclick="gerarRelatorio()">Gerar Relatório PDF</button>

<br><br>

<table>

<thead>

<tr>

<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Destino</th>
<th>Valor</th>
<th>Obs</th>
<th>Ação</th>

</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyB1bGJ4MgsVBw0Z00PBavyWCqRPidQBaQ4",
authDomain:"vtr-encomendas.firebaseapp.com",
projectId:"vtr-encomendas",
storageBucket:"vtr-encomendas.firebasestorage.app",
messagingSenderId:"385080380873",
appId:"1:385080380873:web:3e86123ba4a9ce8fc1ac18"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let registros=[];
let clientes=[];

async function carregarClientes(){

clienteSelect.innerHTML="";

const q=await getDocs(collection(db,"clientes"));

q.forEach(docu=>{

let d=docu.data();

clienteSelect.innerHTML+=`<option>${d.nome}</option>`;

clientes.push(d.nome);

});

}

async function salvarCliente(){

await addDoc(collection(db,"clientes"),{

nome:novoCliente.value

});

novoCliente.value="";

carregarClientes();

}

async function salvarEntrega(){

await addDoc(collection(db,"registros"),{

data:new Date().toLocaleDateString("pt-BR"),
cliente:clienteSelect.value,
origem:origem.value,
destino:destino.value,
valor:parseFloat(valor.value),
obs:obs.value,
pago:false

});

origem.value="";
destino.value="";
valor.value="";
obs.value="";

carregar();

}

async function marcarPago(id){

await updateDoc(doc(db,"registros",id),{pago:true});

carregar();

}

async function excluirRegistro(id){

await deleteDoc(doc(db,"registros",id));

carregar();

}

async function carregar(){

registros=[];

const q=await getDocs(collection(db,"registros"));

q.forEach(docu=>{

let r=docu.data();

r.id=docu.id;

registros.push(r);

});

registros.sort((a,b)=>a.cliente.localeCompare(b.cliente));

atualizar();

}

function atualizar(){

let fat=0;
let gast=0;

tabela.innerHTML="";

registros.forEach(r=>{

if(r.valor>0)fat+=r.valor;
if(r.valor<0)gast+=Math.abs(r.valor);

let classe=r.pago?"pago-linha":"";

tabela.innerHTML+=`

<tr class="${classe}">

<td>${r.data}</td>
<td>${r.cliente}</td>
<td>${r.origem}</td>
<td>${r.destino}</td>
<td>R$ ${r.valor.toFixed(2)}</td>
<td>${r.obs}</td>

<td>

<button class="small pago" onclick="marcarPago('${r.id}')">PAGO</button>
<button class="small excluir" onclick="excluirRegistro('${r.id}')">Excluir</button>

</td>

</tr>

`;

});

fat.innerText="R$ "+fat.toFixed(2);
gast.innerText="R$ "+gast.toFixed(2);
lucro.innerText="R$ "+(fat-gast).toFixed(2);

}

function gerarRelatorio(){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

let y=20;

doc.setFontSize(12);

doc.text("RELATORIO VTR ENCOMENDAS",20,10);

doc.setFontSize(8);

let empresas={};
let faturamento=0;
let gastos=0;
let entregas=0;

registros.forEach(r=>{

let texto=`${r.data} - ENTREGA ${r.cliente} - ${r.destino} - R$ ${Math.abs(r.valor).toFixed(2)} - (OBS: ${r.obs || "-"})`;

let linhas=doc.splitTextToSize(texto,180);

doc.text(linhas,10,y);

y+=linhas.length*4;

if(r.valor>0){

faturamento+=r.valor;
entregas++;

if(!empresas[r.cliente])
empresas[r.cliente]={total:0,qtd:0};

empresas[r.cliente].total+=r.valor;
empresas[r.cliente].qtd++;

}else{

gastos+=Math.abs(r.valor);

}

if(y>270){

doc.addPage();

y=20;

}

});

doc.save("RELATORIO_VTR_ENCOMENDAS.pdf");

}

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let ativo=document.activeElement;

if(["origem","destino","valor","obs"].includes(ativo.id))
salvarEntrega();

}

});

carregar();
carregarClientes();

window.salvarEntrega=salvarEntrega;
window.salvarCliente=salvarCliente;
window.marcarPago=marcarPago;
window.excluirRegistro=excluirRegistro;
window.gerarRelatorio=gerarRelatorio;

</script>

</body>
</html>
