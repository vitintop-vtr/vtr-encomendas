<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTR ENCOMENDAS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
}

.app{max-width:1400px;margin:auto;padding:30px;}

.header{text-align:center;margin-bottom:30px;}
.header img{height:120px;}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:14px;
text-align:center;
}

.modules{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.module{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:14px;
}

.module input,.module select,.module textarea{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
}

button{
padding:8px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

button.small{
padding:4px 6px;
font-size:10px;
margin:2px;
}

.excluir{background:#dc2626;}
.pago{background:#16a34a;}

.pago-linha{background:rgba(34,197,94,0.2);}

.devedores-painel{
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.painel-vermelho{
background:rgba(220,38,38,0.2);
border:1px solid rgba(220,38,38,0.5);
}

.painel-verde{
background:rgba(34,197,94,0.2);
border:1px solid rgba(34,197,94,0.5);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:12px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<img src="logo.png">
</div>

<div class="dashboard">
<div class="card"><h4>Faturamento</h4><span id="fat">R$ 0</span></div>
<div class="card"><h4>Gastos</h4><span id="gast">R$ 0</span></div>
<div class="card"><h4>Lucro</h4><span id="lucro">R$ 0</span></div>
<div class="card"><h4>Devedores</h4><span id="totalDev">0</span></div>
</div>

<div id="painelDev" class="devedores-painel painel-verde">
<h4 id="tituloDev">Nenhum devedor</h4>
<div id="listaDev"></div>
</div>

<div class="modules">

<div class="module">
<h4>Nova Entrega</h4>

<select id="clienteSelect"></select>
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="valor" type="number" placeholder="Valor">
<textarea id="obs" placeholder="Observações"></textarea>

<button onclick="salvarEntrega()">Salvar</button>
</div>

<div class="module">
<h4>Clientes</h4>
<input id="novoCliente" placeholder="Nome cliente">
<button onclick="salvarCliente()">Salvar</button>
</div>

<div class="module">
<h4>Gastos</h4>

<select id="tipoGasto">
<option>Combustível</option>
<option>Manutenção</option>
<option>Alimentação</option>
<option>Outros</option>
</select>

<input id="valorGasto" type="number" placeholder="Valor">
<button onclick="salvarGasto()">Adicionar gasto</button>

</div>

<div class="module">
<h4>Devedores</h4>

<input id="nomeDev" placeholder="Nome">
<input id="valorDev" type="number" placeholder="Valor">

<button onclick="salvarDevedor()">Adicionar</button>

</div>

</div>

<button onclick="gerarRelatorio()">Gerar Relatório PDF</button>

<br><br>

<table>

<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Destino</th>
<th>Valor</th>
<th>Obs</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyB1bGJ4MgsVBw0Z00PBavyWCqRPidQBaQ4",
authDomain:"vtr-encomendas.firebaseapp.com",
projectId:"vtr-encomendas",
storageBucket:"vtr-encomendas.firebasestorage.app",
messagingSenderId:"385080380873",
appId:"1:385080380873:web:3e86123ba4a9ce8fc1ac18"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let registros=[];
let devedores=[];

async function carregarClientes(){

clienteSelect.innerHTML="";

const q=await getDocs(collection(db,"clientes"));

q.forEach(docu=>{
clienteSelect.innerHTML+=`<option>${docu.data().nome}</option>`;
});

}

async function salvarCliente(){

await addDoc(collection(db,"clientes"),{nome:novoCliente.value});

novoCliente.value="";
carregarClientes();

}

async function salvarEntrega(){

await addDoc(collection(db,"registros"),{
data:new Date().toLocaleDateString("pt-BR"),
cliente:clienteSelect.value,
origem:origem.value,
destino:destino.value,
valor:parseFloat(valor.value),
obs:obs.value,
pago:false
});

origem.value="";
destino.value="";
valor.value="";
obs.value="";

carregar();

}

async function salvarGasto(){

await addDoc(collection(db,"registros"),{
data:new Date().toLocaleDateString("pt-BR"),
cliente:"Gasto "+tipoGasto.value,
origem:"-",
destino:"-",
valor:-Math.abs(parseFloat(valorGasto.value)),
obs:"-"
});

valorGasto.value="";
carregar();

}

async function salvarDevedor(){

let nome=nomeDev.value.trim();
let valor=parseFloat(valorDev.value);

const q=await getDocs(collection(db,"devedores"));

let encontrado=null;

q.forEach(docu=>{
let d=docu.data();
if(d.nome.toLowerCase()==nome.toLowerCase()){
encontrado={id:docu.id,valor:d.valor};
}
});

if(encontrado){

let novo=encontrado.valor+valor;

await deleteDoc(doc(db,"devedores",encontrado.id));

await addDoc(collection(db,"devedores"),{
nome:nome,
valor:novo
});

}else{

await addDoc(collection(db,"devedores"),{
nome:nome,
valor:valor
});

}

nomeDev.value="";
valorDev.value="";

carregarDevedores();

}

async function excluirDevedor(id){

await deleteDoc(doc(db,"devedores",id));
carregarDevedores();

}

async function carregarDevedores(){

devedores=[];

const q=await getDocs(collection(db,"devedores"));

listaDev.innerHTML="";

q.forEach(docu=>{

let d=docu.data();

listaDev.innerHTML+=`${d.nome} - R$ ${d.valor.toFixed(2)}
<button class="small excluir" onclick="excluirDevedor('${docu.id}')">Excluir</button><br>`;

devedores.push(d);

});

totalDev.innerText=devedores.length;

if(devedores.length==0){

painelDev.className="devedores-painel painel-verde";
tituloDev.innerText="Nenhum devedor";

}else{

painelDev.className="devedores-painel painel-vermelho";
tituloDev.innerText="Devedores em aberto";

}

}

async function carregar(){

registros=[];

const q=await getDocs(collection(db,"registros"));

q.forEach(docu=>{
let r=docu.data();
r.id=docu.id;
registros.push(r);
});

registros.sort((a,b)=>a.cliente.localeCompare(b.cliente));

atualizar();

}

function atualizar(){

let faturamento=0;
let gastos=0;

tabela.innerHTML="";

registros.forEach(r=>{

if(r.valor>0)faturamento+=r.valor;
if(r.valor<0)gastos+=Math.abs(r.valor);

let classe=r.pago?"pago-linha":"";

tabela.innerHTML+=`
<tr class="${classe}">
<td>${r.data}</td>
<td>${r.cliente}</td>
<td>${r.origem}</td>
<td>${r.destino}</td>
<td>R$ ${r.valor.toFixed(2)}</td>
<td>${r.obs||"-"}</td>
<td>
<button class="small pago" onclick="marcarPago('${r.id}')">PAGO</button>
<button class="small excluir" onclick="excluirRegistro('${r.id}')">Excluir</button>
</td>
</tr>
`;

});

fat.innerText="R$ "+faturamento.toFixed(2);
gast.innerText="R$ "+gastos.toFixed(2);
lucro.innerText="R$ "+(faturamento-gastos).toFixed(2);

}

async function marcarPago(id){

await updateDoc(doc(db,"registros",id),{pago:true});
carregar();

}

async function excluirRegistro(id){

await deleteDoc(doc(db,"registros",id));
carregar();

}

function gerarRelatorio(){

const { jsPDF }=window.jspdf;

const doc=new jsPDF();

let y=20;

doc.setFontSize(10);

registros.forEach(r=>{

let texto=`${r.data} - ENTREGA ${r.cliente} - ${r.destino} - R$ ${Math.abs(r.valor).toFixed(2)} - (OBS: ${r.obs||"-"})`;

let linhas=doc.splitTextToSize(texto,180);

doc.text(linhas,10,y);

y+=linhas.length*4;

if(y>270){
doc.addPage();
y=20;
}

});

doc.save("RELATORIO_VTR_ENCOMENDAS.pdf");

}

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let ativo=document.activeElement;

if(["origem","destino","valor","obs"].includes(ativo.id))
salvarEntrega();

if(ativo.id==="valorGasto")
salvarGasto();

if(ativo.id==="valorDev")
salvarDevedor();

}

});

carregar();
carregarClientes();
carregarDevedores();

window.salvarEntrega=salvarEntrega;
window.salvarCliente=salvarCliente;
window.salvarGasto=salvarGasto;
window.salvarDevedor=salvarDevedor;
window.excluirRegistro=excluirRegistro;
window.marcarPago=marcarPago;
window.excluirDevedor=excluirDevedor;
window.gerarRelatorio=gerarRelatorio;

</script>

</body>
</html>
