<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VTR ENCOMENDAS | Sistema</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI,Arial;
background:#0f172a;
color:#fff;
}

.app{
max-width:1400px;
margin:auto;
padding:30px;
}

.header{text-align:center;margin-bottom:30px;}
.header img{height:150px;}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:14px;
text-align:center;
}

.modules{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.module{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:14px;
}

.module input,.module select,.module textarea{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.1);
color:#fff;
}

.module textarea{height:60px;}

.module button{
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:#2563eb;
color:#fff;
cursor:pointer;
margin-bottom:5px;
}

button.small{
padding:4px 6px;
font-size:10px;
border:none;
border-radius:6px;
color:#fff;
margin-right:3px;
}

.excluir{background:#dc2626;}
.pago{background:#16a34a;}

.pago-linha{
background:rgba(34,197,94,0.2);
}

.devedores-painel{padding:15px;border-radius:12px;margin-bottom:20px;}

.painel-vermelho{
background:rgba(220,38,38,0.15);
border:1px solid rgba(220,38,38,0.4);
}

.painel-verde{
background:rgba(34,197,94,0.15);
border:1px solid rgba(34,197,94,0.4);
}

.table-section{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:14px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:12px;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
<img src="logo.png">
</div>

<div class="dashboard">

<div class="card">
<h4>Faturamento</h4>
<span id="fat">R$ 0,00</span>
</div>

<div class="card">
<h4>Gastos</h4>
<span id="gast">R$ 0,00</span>
</div>

<div class="card">
<h4>Lucro</h4>
<span id="lucro">R$ 0,00</span>
</div>

<div class="card">
<h4>Devedores</h4>
<span id="totalDev">0</span>
</div>

</div>

<div id="painelDev" class="devedores-painel painel-verde">

<h4 id="tituloDev">✅ Nenhum devedor</h4>

<div id="listaDev"></div>

</div>

<div class="modules">

<div class="module">

<h4>Nova Entrega</h4>

<select id="clienteSelect"></select>

<input id="origem" placeholder="Origem">

<input id="destino" placeholder="Destino">

<input id="valor" type="number" placeholder="Valor">

<textarea id="obs" placeholder="Observações"></textarea>

<button onclick="salvarEntrega()">Salvar</button>

</div>

<div class="module">

<h4>Cadastro Clientes</h4>

<input id="novoCliente" placeholder="Nome Cliente">

<select id="clienteExcluir"></select>

<button onclick="salvarCliente()">Salvar Cliente</button>

<button onclick="excluirCliente()">Excluir Cliente</button>

</div>

<div class="module">

<h4>Gastos</h4>

<select id="tipoGasto">
<option>Combustível</option>
<option>Manutenção</option>
<option>Alimentação</option>
<option>Outros</option>
</select>

<input id="valorGasto" type="number" placeholder="Valor">

<button onclick="salvarGasto()">Adicionar Gasto</button>

</div>

<div class="module">

<h4>Devedores</h4>

<input id="nomeDev" placeholder="Nome">

<input id="valorDev" type="number" placeholder="Valor">

<button onclick="salvarDevedor()">Adicionar</button>

</div>

</div>

<div class="module" style="margin-bottom:20px;">

<h4>Relatório</h4>

<button onclick="gerarRelatorio()">Gerar Relatório PDF</button>

</div>

<div class="table-section">

<h4>Movimentações</h4>

<table>

<thead>

<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Destino</th>
<th>Valor</th>
<th>Obs</th>
<th>Ação</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyB1bGJ4MgsVBw0Z00PBavyWCqRPidQBaQ4",
authDomain:"vtr-encomendas.firebaseapp.com",
projectId:"vtr-encomendas",
storageBucket:"vtr-encomendas.firebasestorage.app",
messagingSenderId:"385080380873",
appId:"1:385080380873:web:3e86123ba4a9ce8fc1ac18"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let registros=[];
let devedores=[];

async function salvarEntrega(){

await addDoc(collection(db,"registros"),{

data:new Date().toLocaleDateString("pt-BR"),
cliente:clienteSelect.value,
origem:origem.value,
destino:destino.value,
valor:parseFloat(valor.value),
obs:obs.value,
pago:false

});

origem.value="";
destino.value="";
valor.value="";
obs.value="";

carregar();

}

async function marcarPago(id){

await updateDoc(doc(db,"registros",id),{pago:true});

carregar();

}

async function excluirRegistro(id){

await deleteDoc(doc(db,"registros",id));

carregar();

}

async function carregar(){

registros=[];

const q=await getDocs(collection(db,"registros"));

q.forEach(doc=>{
let r=doc.data();
r.id=doc.id;
registros.push(r);
});

registros.sort((a,b)=>a.cliente.localeCompare(b.cliente));

atualizar();

}

function atualizar(){

let f=0,g=0;

tabela.innerHTML="";

registros.forEach(r=>{

if(r.valor>0)f+=r.valor;
if(r.valor<0)g+=Math.abs(r.valor);

let classe=r.pago?"pago-linha":"";

tabela.innerHTML+=`

<tr class="${classe}">
<td>${r.data}</td>
<td>${r.cliente}</td>
<td>${r.origem}</td>
<td>${r.destino}</td>
<td>R$ ${r.valor.toFixed(2)}</td>
<td>${r.obs}</td>

<td>
<button class="small pago" onclick="marcarPago('${r.id}')">PAGO</button>
<button class="small excluir" onclick="excluirRegistro('${r.id}')">Excluir</button>
</td>

</tr>

`;

});

fat.innerText="R$ "+f.toFixed(2);
gast.innerText="R$ "+g.toFixed(2);
lucro.innerText="R$ "+(f-g).toFixed(2);

}

function gerarRelatorio(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y = 20;

doc.setFontSize(16);
doc.text("RELATÓRIO VTR ENCOMENDAS",20,10);

doc.setFontSize(11);

let ordenado=[...registros].sort((a,b)=>a.cliente.localeCompare(b.cliente));

let empresas={};
let faturamento=0;
let gastos=0;
let entregas=0;

ordenado.forEach(r=>{

let linha=`${r.data} - ENTREGA ${r.cliente} - ${r.destino} - R$ ${Math.abs(r.valor).toFixed(2)} - (OBS: ${r.obs || "-"})`;

doc.text(linha,10,y);
y+=7;

if(r.valor>0){

faturamento+=r.valor;
entregas++;

if(!empresas[r.cliente])empresas[r.cliente]={total:0,qtd:0};

empresas[r.cliente].total+=r.valor;
empresas[r.cliente].qtd++;

}else{
gastos+=Math.abs(r.valor);
}

});

y+=10;

doc.setFontSize(14);
doc.text("TOTAL POR EMPRESA",20,y);
y+=10;

for(let e in empresas){

doc.text(`${e} - Entregas: ${empresas[e].qtd} - Total: R$ ${empresas[e].total.toFixed(2)}`,20,y);

y+=7;

}

y+=10;

doc.text("RESUMO FINAL",20,y);
y+=10;

doc.setFontSize(12);

doc.text(`TOTAL DE ENTREGAS: ${entregas}`,20,y);
y+=7;

doc.text(`FATURAMENTO TOTAL: R$ ${faturamento.toFixed(2)}`,20,y);
y+=7;

doc.text(`TOTAL DE GASTOS: R$ ${gastos.toFixed(2)}`,20,y);
y+=7;

doc.text(`LUCRO FINAL: R$ ${(faturamento-gastos).toFixed(2)}`,20,y);

doc.save("RELATORIO_VTR_ENCOMENDAS.pdf");

}

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let ativo=document.activeElement;

if(["origem","destino","valor","obs"].includes(ativo.id))salvarEntrega();
if(ativo.id==="valorGasto")salvarGasto();
if(ativo.id==="valorDev")salvarDevedor();

}

});

carregar();

window.salvarEntrega=salvarEntrega;
window.excluirRegistro=excluirRegistro;
window.marcarPago=marcarPago;
window.gerarRelatorio=gerarRelatorio;

</script>

</body>
</html>
