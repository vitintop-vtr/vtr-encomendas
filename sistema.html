<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VTR ENCOMENDAS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:#fff;
margin:0;
}

.app{
max-width:1400px;
margin:auto;
padding:30px;
}

.header{
text-align:center;
margin-bottom:30px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:14px;
text-align:center;
}

.module{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:14px;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.1);
color:#fff;
}

button{
padding:8px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

button.small{
padding:4px 6px;
font-size:11px;
}

.pago{
background:#16a34a;
}

.excluir{
background:#dc2626;
}

.pago-linha{
background:rgba(34,197,94,0.2);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
text-align:center;
font-size:12px;
}

.devedores-painel{
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.painel-vermelho{
background:rgba(220,38,38,0.2);
border:1px solid rgba(220,38,38,0.5);
}

.painel-verde{
background:rgba(34,197,94,0.2);
border:1px solid rgba(34,197,94,0.5);
}

#abasDatas button{
margin:3px;
background:#334155;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<img src="logo.png" height="120">
</div>

<div class="dashboard">

<div class="card">
<h4>Faturamento</h4>
<span id="fat">R$ 0</span>
</div>

<div class="card">
<h4>Gastos</h4>
<span id="gast">R$ 0</span>
</div>

<div class="card">
<h4>Lucro</h4>
<span id="lucro">R$ 0</span>
</div>

<div class="card">
<h4>Devedores</h4>
<span id="totalDev">0</span>
</div>

</div>

<div id="painelDev" class="devedores-painel painel-verde">

<h4 id="tituloDev">Nenhum devedor</h4>

<div id="listaDev"></div>

</div>

<div class="module">

<h4>Nova Entrega</h4>

<select id="clienteSelect"></select>

<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="valor" type="number" placeholder="Valor">
<textarea id="obs" placeholder="Observações"></textarea>

<button onclick="salvarEntrega()">Salvar</button>

</div>

<div class="module">

<h4>Pesquisar por data</h4>

<input id="pesquisaData" placeholder="ex: 04/03/2026">

<button onclick="pesquisarData()">Buscar</button>

</div>

<div id="abasDatas"></div>

<div class="module">

<button onclick="gerarRelatorio()">Gerar Relatório PDF</button>

</div>

<table>

<thead>

<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Destino</th>
<th>Valor</th>
<th>Obs</th>
<th>Ação</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyB1bGJ4MgsVBw0Z00PBavyWCqRPidQBaQ4",
authDomain:"vtr-encomendas.firebaseapp.com",
projectId:"vtr-encomendas",
storageBucket:"vtr-encomendas.firebasestorage.app",
messagingSenderId:"385080380873",
appId:"1:385080380873:web:3e86123ba4a9ce8fc1ac18"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let registros=[];
let devedores=[];

async function carregar(){

registros=[];

const q=await getDocs(collection(db,"registros"));

q.forEach(docu=>{
let r=docu.data();
r.id=docu.id;
registros.push(r);
});

registros.sort((a,b)=>a.cliente.localeCompare(b.cliente));

atualizar();
gerarAbasDatas();

}

function atualizar(){

let faturamento=0;
let gastos=0;

tabela.innerHTML="";

registros.forEach(r=>{

if(r.valor>0)faturamento+=r.valor;
if(r.valor<0)gastos+=Math.abs(r.valor);

let classe=r.pago?"pago-linha":"";

tabela.innerHTML+=`
<tr class="${classe}">
<td>${r.data}</td>
<td>${r.cliente}</td>
<td>${r.origem}</td>
<td>${r.destino}</td>
<td>R$ ${r.valor.toFixed(2)}</td>
<td>${r.obs||"-"}</td>
<td>
<button class="small pago" onclick="marcarPago('${r.id}')">PAGO</button>
<button class="small excluir" onclick="excluirRegistro('${r.id}')">Excluir</button>
</td>
</tr>
`;

});

fat.innerText="R$ "+faturamento.toFixed(2);
gast.innerText="R$ "+gastos.toFixed(2);
lucro.innerText="R$ "+(faturamento-gastos).toFixed(2);

}

function gerarAbasDatas(){

let datas=[...new Set(registros.map(r=>r.data))];

abasDatas.innerHTML=`<button onclick="filtrarData('todas')">Todas</button>`;

datas.forEach(d=>{
abasDatas.innerHTML+=`<button onclick="filtrarData('${d}')">${d}</button>`;
});

}

function filtrarData(data){

tabela.innerHTML="";

let lista=data==="todas"
? registros
: registros.filter(r=>r.data===data);

lista.forEach(r=>{

let classe=r.pago?"pago-linha":"";

tabela.innerHTML+=`
<tr class="${classe}">
<td>${r.data}</td>
<td>${r.cliente}</td>
<td>${r.origem}</td>
<td>${r.destino}</td>
<td>R$ ${r.valor.toFixed(2)}</td>
<td>${r.obs||"-"}</td>
<td>
<button class="small pago" onclick="marcarPago('${r.id}')">PAGO</button>
<button class="small excluir" onclick="excluirRegistro('${r.id}')">Excluir</button>
</td>
</tr>
`;

});

}

function pesquisarData(){

let data=pesquisaData.value;

filtrarData(data);

}

function gerarRelatorio(){

const { jsPDF }=window.jspdf;

const doc=new jsPDF({orientation:"landscape"});

let y=15;

doc.setFontSize(10);

registros.forEach(r=>{

let linha=`${r.data} - ENTREGA ${r.cliente} - ${r.destino} - R$ ${Math.abs(r.valor).toFixed(2)} - (OBS: ${r.obs||"-"})`;

doc.text(linha,15,y);

y+=6;

if(y>190){
doc.addPage();
y=15;
}

});

doc.save("RELATORIO_VTR_ENCOMENDAS.pdf");

}

async function excluirRegistro(id){

await deleteDoc(doc(db,"registros",id));

carregar();

}

async function marcarPago(id){

await updateDoc(doc(db,"registros",id),{pago:true});

carregar();

}

carregar();

window.salvarEntrega=salvarEntrega;
window.excluirRegistro=excluirRegistro;
window.marcarPago=marcarPago;
window.gerarRelatorio=gerarRelatorio;
window.filtrarData=filtrarData;
window.pesquisarData=pesquisarData;

</script>

</body>
</html>
